name: Bug report
description: Report a reproducible problem in Laravel Swagger Routebook.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Routebook. Please include enough detail to reproduce the issue.
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: laravel
    attributes:
      label: Laravel version
      placeholder: 12.x
    validations:
      required: true
  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: 8.2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: List the smallest steps that reproduce the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

