name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '10'
            testbench: '^8.0'
            phpunit: '^10.0'
          - php: '8.2'
            laravel: '11'
            testbench: '^9.0'
            phpunit: '^10.0'
          - php: '8.2'
            laravel: '12'
            testbench: '^10.0'
            phpunit: '^11.0'
          - php: '8.3'
            laravel: '12'
            testbench: '^10.0'
            phpunit: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Configure Laravel dependency versions
        run: |
          composer require \
            "illuminate/contracts:^${{ matrix.laravel }}.0" \
            "illuminate/http:^${{ matrix.laravel }}.0" \
            "illuminate/routing:^${{ matrix.laravel }}.0" \
            "illuminate/support:^${{ matrix.laravel }}.0" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}" \
            --no-update \
            --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Lint PHP files
        run: git ls-files '*.php' | xargs -n 1 php -l

      - name: Audit dependencies
        run: composer audit

      - name: Run tests
        run: vendor/bin/phpunit

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

